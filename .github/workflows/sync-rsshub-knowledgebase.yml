name: Sync RSSHub Knowledgebase

on:
  workflow_dispatch:
    inputs:
      rsshub_ref:
        description: RSSHub git ref to build
        required: false
        default: master
      target_branch:
        description: Branch to publish generated knowledgebase into
        required: false
        default: rsshub-routes-knowledgebase
  schedule:
    - cron: "23 2 * * *"

permissions:
  contents: write

concurrency:
  group: sync-rsshub-knowledgebase
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      DEFAULT_RSSHUB_REF: master
      DEFAULT_TARGET_BRANCH: rsshub-routes-knowledgebase
      RSSHUB_REPO: https://github.com/DIYgod/RSSHub.git
      GENERATED_DIR: /tmp/rsshub-knowledgebase-output
      PUBLISH_DIR: /tmp/rsshub-knowledgebase-branch

    steps:
      - name: Checkout plugin repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set variables
        id: vars
        shell: bash
        run: |
          set -euo pipefail
          rsshub_ref="${{ github.event.inputs.rsshub_ref }}"
          target_branch="${{ github.event.inputs.target_branch }}"

          if [ -z "$rsshub_ref" ]; then
            rsshub_ref="$DEFAULT_RSSHUB_REF"
          fi
          if [ -z "$target_branch" ]; then
            target_branch="$DEFAULT_TARGET_BRANCH"
          fi

          echo "rsshub_ref=$rsshub_ref" >> "$GITHUB_OUTPUT"
          echo "target_branch=$target_branch" >> "$GITHUB_OUTPUT"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Clone RSSHub
        shell: bash
        run: |
          set -euo pipefail
          git clone --depth 1 --branch "${{ steps.vars.outputs.rsshub_ref }}" "$RSSHUB_REPO" /tmp/RSSHub

      - name: Detect package manager
        id: pkg
        shell: bash
        working-directory: /tmp/RSSHub
        run: |
          set -euo pipefail
          if [ -f pnpm-lock.yaml ]; then
            echo "manager=pnpm" >> "$GITHUB_OUTPUT"
          elif [ -f package-lock.json ]; then
            echo "manager=npm" >> "$GITHUB_OUTPUT"
          else
            echo "manager=pnpm" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup pnpm
        if: steps.pkg.outputs.manager == 'pnpm'
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install RSSHub dependencies
        shell: bash
        working-directory: /tmp/RSSHub
        run: |
          set -euo pipefail
          if [ "${{ steps.pkg.outputs.manager }}" = "pnpm" ]; then
            pnpm install --frozen-lockfile
          else
            npm ci
          fi

      - name: Build RSSHub route assets
        shell: bash
        working-directory: /tmp/RSSHub
        run: |
          set -euo pipefail

          if [ "${{ steps.pkg.outputs.manager }}" = "pnpm" ]; then
            if pnpm run | grep -q "build:routes"; then
              pnpm build:routes
            elif pnpm run | grep -q "build"; then
              pnpm build
            else
              echo "No suitable pnpm build script found." >&2
              exit 1
            fi
          else
            if npm run | grep -q "build:routes"; then
              npm run build:routes
            elif npm run | grep -q "build"; then
              npm run build
            else
              echo "No suitable npm build script found." >&2
              exit 1
            fi
          fi

      - name: Locate generated routes.json
        id: routes
        shell: bash
        working-directory: /tmp/RSSHub
        run: |
          set -euo pipefail
          candidates=(
            "assets/build/routes.json"
            "assets/routes.json"
            "dist/routes.json"
            "build/routes.json"
          )

          for candidate in "${candidates[@]}"; do
            if [ -f "$candidate" ]; then
              echo "path=/tmp/RSSHub/$candidate" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          done

          found="$(find . -type f -name routes.json | head -n 1 || true)"
          if [ -n "$found" ]; then
            echo "path=/tmp/RSSHub/${found#./}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Unable to find generated routes.json." >&2
          exit 1

      - name: Generate knowledgebase files
        shell: bash
        run: |
          set -euo pipefail
          rsshub_revision="$(git -C /tmp/RSSHub rev-parse HEAD)"
          python .github/scripts/generate_knowledgebase.py \
            --input "${{ steps.routes.outputs.path }}" \
            --output "$GENERATED_DIR" \
            --source-revision "$rsshub_revision" \
            --source-repo "$RSSHUB_REPO"

      - name: Prepare publish branch
        shell: bash
        run: |
          set -euo pipefail
          target_branch="${{ steps.vars.outputs.target_branch }}"

          git fetch origin "$target_branch" || true

          rm -rf "$PUBLISH_DIR"
          if git show-ref --verify --quiet "refs/remotes/origin/$target_branch"; then
            git worktree add --track -B "$target_branch" "$PUBLISH_DIR" "origin/$target_branch"
          else
            git worktree add -B "$target_branch" "$PUBLISH_DIR"
            git -C "$PUBLISH_DIR" checkout --orphan "$target_branch"
          fi

      - name: Replace branch contents
        shell: bash
        run: |
          set -euo pipefail
          find "$PUBLISH_DIR" -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          cp -R "$GENERATED_DIR"/. "$PUBLISH_DIR"/

      - name: Commit and push
        shell: bash
        run: |
          set -euo pipefail
          target_branch="${{ steps.vars.outputs.target_branch }}"
          git -C "$PUBLISH_DIR" config user.name "github-actions[bot]"
          git -C "$PUBLISH_DIR" config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git -C "$PUBLISH_DIR" add -A
          if git -C "$PUBLISH_DIR" diff --cached --quiet --no-ext-diff; then
            echo "No staged changes detected."
            exit 0
          fi

          git -C "$PUBLISH_DIR" commit -m "chore: sync RSSHub knowledgebase"
          git -C "$PUBLISH_DIR" push origin "HEAD:$target_branch"
